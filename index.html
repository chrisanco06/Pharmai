<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmIA – Trouvez le bon produit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E8E3DA;
    --text: #1A1814;
    --muted: #8A8278;
    --accent: #2D6A4F;
    --accent-light: #E8F5EE;
    --accent2: #40916C;
    --pill-bg: #EEF7F2;
    --chat-user: #2D6A4F;
    --chat-user-text: #fff;
    --chat-ai: #FFFFFF;
    --shadow: 0 2px 20px rgba(0,0,0,0.07);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 800px;
    padding: 32px 24px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 2px;
  }

  .disclaimer {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    background: #FFF8E7;
    border: 1px solid #F0D9A0;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .chat-container {
    width: 100%;
    max-width: 800px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 24px 0;
    gap: 16px;
    min-height: 0;
  }

  .messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    padding-bottom: 8px;
    max-height: 62vh;
  }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .avatar.ai {
    background: var(--accent);
    color: white;
    font-size: 18px;
  }

  .avatar.user {
    background: #E8E3DA;
    font-size: 16px;
  }

  .bubble {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 15px;
  }

  .msg.ai .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }

  .msg.user .bubble {
    background: var(--chat-user);
    color: var(--chat-user-text);
    border-bottom-right-radius: 4px;
  }

  .bubble strong { font-weight: 600; }
  .bubble em { color: var(--accent); font-style: normal; font-weight: 500; }

  /* Quick reply chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .chip {
    background: var(--pill-bg);
    border: 1.5px solid #B7DFC9;
    color: var(--accent);
    padding: 7px 16px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .chip:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  /* Product cards */
  .product-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }

  .product-card {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .product-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .product-card.top {
    border-color: var(--accent2);
    background: #F0FAF5;
  }

  .product-icon {
    width: 44px; height: 44px;
    background: white;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .product-info { flex: 1; }
  .product-name { font-weight: 600; font-size: 15px; }
  .product-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .product-badge {
    font-size: 11px;
    font-weight: 600;
    background: var(--accent);
    color: white;
    padding: 3px 10px;
    border-radius: 50px;
    white-space: nowrap;
  }

  .product-badge.secondary {
    background: #E8E3DA;
    color: var(--muted);
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 14px 18px;
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    padding: 16px 0 24px;
    width: 100%;
    max-width: 800px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 8px 8px 8px 20px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  #userInput {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: transparent;
    color: var(--text);
  }

  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    width: 40px; height: 40px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #sendBtn:hover { background: var(--accent2); transform: scale(1.05); }
  #sendBtn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  /* Progress bar */
  .progress {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
    align-items: center;
  }

  .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }

  .progress-dot.done { background: var(--accent); }
  .progress-dot.active { background: var(--accent2); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-left: 4px;
  }

  /* Warning box */
  .warn-box {
    background: #FFF8E7;
    border: 1px solid #F0D9A0;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #7A5C00;
    margin-top: 10px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div>
      <div class="logo-text">PharmIA</div>
      <div class="logo-sub">Conseil produit intelligent</div>
    </div>
  </div>
  <div class="disclaimer">⚠️ Démo — pas un conseil médical</div>
</header>

<div class="chat-container">
  <div class="messages" id="messages"></div>
</div>

<div class="input-area" style="padding: 16px 24px 24px; width:100%; max-width:800px; margin:0 auto;">
  <div class="progress" id="progressBar">
    <div class="progress-dot active" id="p0"></div>
    <div class="progress-dot" id="p1"></div>
    <div class="progress-dot" id="p2"></div>
    <div class="progress-dot" id="p3"></div>
    <div class="progress-dot" id="p4"></div>
    <span class="progress-label" id="progressLabel">Étape 1 / 5 — Symptôme principal</span>
  </div>
  <div class="input-row">
    <input type="text" id="userInput" placeholder="Décrivez votre besoin ou choisissez une option…" autocomplete="off"/>
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const API_URL = "/api/chat";

const SYSTEM_PROMPT = `Tu es PharmIA, un assistant de pharmacie intelligent qui aide les clients à trouver le bon produit OTC (sans ordonnance) ou parapharmacie en France.

RÈGLES ABSOLUES :
- Tu poses UNE SEULE question à la fois, très précise et simple
- Tu proposes TOUJOURS des réponses rapides sous forme d'options courtes (max 5 mots chacune)
- Tu collectes : (1) symptôme/besoin, (2) âge/profil, (3) durée/intensité, (4) contre-indications connues, (5) préférence forme (comprimé/spray/crème/sirop)
- Après 4-5 échanges, tu proposes 2-3 produits concrets avec nom commercial français, forme, posologie brève et indication principale
- Tu n'es PAS un médecin : tu rappelles brièvement de consulter si urgence ou doute
- Tu réponds TOUJOURS en JSON avec ce format exact :
{
  "message": "texte de ta réponse",
  "chips": ["option1", "option2", "option3"],
  "products": null,
  "step": 1,
  "warning": null
}

Quand tu proposes des produits, products devient un tableau :
[
  {"name": "Nom produit", "desc": "Indication + forme + posologie courte", "icon": "emoji", "top": true/false},
  ...
]

Les chips sont toujours des réponses courtes cliquables. warning est une string si besoin d'alerter (urgence médicale, etc).

Commence par une question chaleureuse sur le symptôme principal. Sois humain, chaleureux, efficace.`;

let conversationHistory = [];
let step = 0;

function addMsg(role, html, chips = [], products = null, warning = null) {
  const messages = document.getElementById('messages');
  
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '🌿' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;

  if (warning) {
    const warn = document.createElement('div');
    warn.className = 'warn-box';
    warn.innerHTML = `⚠️ ${warning}`;
    bubble.appendChild(warn);
  }

  if (chips && chips.length > 0) {
    const chipRow = document.createElement('div');
    chipRow.className = 'chips';
    chips.forEach(c => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = c;
      chip.onclick = () => sendMessage(c);
      chipRow.appendChild(chip);
    });
    bubble.appendChild(chipRow);
  }

  if (products && products.length > 0) {
    const cards = document.createElement('div');
    cards.className = 'product-cards';
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = `product-card${p.top ? ' top' : ''}`;
      card.innerHTML = `
        <div class="product-icon">${p.icon || '💊'}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
        </div>
        <div class="product-badge ${p.top ? '' : 'secondary'}">${p.top ? '✓ Recommandé' : 'Alternative'}</div>
      `;
      cards.appendChild(card);
    });
    bubble.appendChild(cards);
  }

  if (role === 'ai') {
    div.appendChild(avatar);
    div.appendChild(bubble);
  } else {
    div.appendChild(bubble);
    div.appendChild(avatar);
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '🌿';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function updateProgress(s) {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById(`p${i}`);
    if (i < s) { dot.className = 'progress-dot done'; }
    else if (i === s) { dot.className = 'progress-dot active'; }
    else { dot.className = 'progress-dot'; }
  }
  const labels = ['Symptôme principal', 'Profil patient', 'Durée & intensité', 'Contre-indications', 'Recommandation'];
  document.getElementById('progressLabel').textContent = `Étape ${Math.min(s+1, 5)} / 5 — ${labels[Math.min(s, 4)]}`;
}

async function callClaude(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });

  const response = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });

  const data = await response.json();
  const rawText = data.content.map(i => i.text || '').join('');
  
  let parsed;
  try {
    const clean = rawText.replace(/```json|```/g, '').trim();
    parsed = JSON.parse(clean);
  } catch(e) {
    parsed = { message: rawText, chips: [], products: null, step: step, warning: null };
  }

  conversationHistory.push({ role: "assistant", content: rawText });
  return parsed;
}

async function sendMessage(text) {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const msg = text || input.value.trim();
  if (!msg) return;

  input.value = '';
  btn.disabled = true;

  addMsg('user', msg);
  showTyping();

  try {
    const result = await callClaude(msg);
    removeTyping();
    step = Math.min((result.step || step) , 4);
    updateProgress(step);
    addMsg('ai', result.message, result.chips || [], result.products, result.warning);
  } catch(e) {
    removeTyping();
    addMsg('ai', "Désolé, une erreur est survenue. Réessayez.", ['Réessayer']);
  }

  btn.disabled = false;
  input.focus();
}

// Init
document.getElementById('sendBtn').onclick = () => sendMessage();
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// First message from AI
(async () => {
  showTyping();
  try {
    const result = await callClaude("Bonjour, je cherche un produit.");
    removeTyping();
    addMsg('ai', result.message, result.chips || [], result.products, result.warning);
  } catch(e) {
    removeTyping();
    addMsg('ai', "Bonjour ! Quel est votre symptôme ou besoin principal aujourd'hui ?", 
      ["Douleur / fièvre", "Rhume / toux", "Peau / allergie", "Digestion", "Sommeil"]);
  }
})();
</script>
</body>
</html>
